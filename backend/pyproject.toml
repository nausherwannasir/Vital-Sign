[tool.black]
line-length = 100
target-version = ['py38']
exclude = '/(venv|\.venv|\.git)/'

[tool.pylint.messages_control]
disable = [
    "C0111",  # missing-docstring
    "C0103",  # invalid-name
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=. --cov-report=html --cov-report=term-missing"
